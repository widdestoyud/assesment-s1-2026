map $http_origin $allow_origin {
    ~^https?://(.*\.)?(my|tdwpreweb).telkomsel.com(:\d+)?$ $http_origin;
    # NGINX won't set empty string headers, so if no match, header is unset.
    default "";
}

server {
  listen 8080;

  root /usr/share/nginx/html/;

  gzip on;
  gzip_types
    application/javascript
    application/json
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # Server Static Web UI Files
  location / {
    add_header 'X-Frame-Options' 'SAMEORIGIN' 'always';
    add_header 'Strict-Transport-Security' 'max-age=31536000; includeSubDomains; preload' 'always';
    add_header 'Access-Control-Allow-Origin' $allow_origin;
    add_header 'Access-Control-Allow-Credentials' 'true';
    try_files $uri /index.html =404;
    index index.html index.htm;
    autoindex off;

    auth_basic 'MyTelkomsel Area';
    auth_basic_user_file /etc/nginx/.htpasswd;
  }

  # serve static files
  location ~ (.+)\.(html|json|txt|js|css|jpg|jpeg|gif|png|svg|ico|eot|otf|woff|woff2|ttf)$ {
    # expires 30d;
    add_header Pragma public;
    add_header Cache-Control "public";
    add_header X-Call-Uri $uri;
    try_files $uri @pathfiles;
  }

  location @rootfiles {
    rewrite ^.*/(.*)$ /$1 break;
  }

  location @pathfiles {
    rewrite ^/[^/]+(/.*)?$ $1 last;
  }

  # Server status
  location /nginx_status {
    stub_status on;
    allow 127.0.0.1;
    deny all;
  }
}
